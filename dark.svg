        <rect x="600" y="473" width="70" height="28" rx="14" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
        <text x="635" y="491" text-anchor="middle" fill="#A78BFA">Flask</text>
      </g>
