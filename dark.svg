<svg viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg" width="100%" style="border-radius:24px; max-width:1180px;">
  <defs>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#10B981;#22D3EE" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#10B981;#22D3EE;#7C3AED" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#22D3EE;#7C3AED;#10B981" dur="6s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 590 305" to="360 590 305" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="borderShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(124,58,237,0)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.6)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0)"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1180 0" to="1180 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.15)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.08)"/>
      <stop offset="100%" stop-color="rgba(3,7,18,0)"/>
      <animate attributeName="cx" values="30%;70%;30%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="30%;70%;30%" dur="10s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="bgGlow2" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.1)"/>
      <stop offset="100%" stop-color="rgba(3,7,18,0)"/>
      <animate attributeName="cx" values="80%;20%;80%" dur="12s" repeatCount="indefinite"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>

    <mask id="panelMask">
      <rect x="20" y="20" width="1140" height="570" rx="24" fill="white"/>
    </mask>

    <clipPath id="asciiClip">
      <rect x="40" y="40" width="500" height="530" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1180" height="610" fill="#030712" rx="24"/>
  <rect width="1180" height="610" fill="url(#bgGlow)" rx="24"/>
  <rect width="1180" height="610" fill="url(#bgGlow2)" rx="24"/>
  <rect width="1180" height="610" fill="url(#bgGlow)" rx="24" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>

  <rect width="1180" height="610" filter="url(#noise)" opacity="0.4" rx="24"/>

  <rect x="20" y="20" width="1140" height="570" rx="24" fill="#0F172A" fill-opacity="0.6" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <rect x="20" y="20" width="1140" height="285" rx="24" fill="url(#borderShimmer)" opacity="0.05" clip-path="url(#panelMask)"/>

  <rect x="20" y="20" width="1140" height="2" fill="rgba(34,211,238,0.15)" rx="1">
    <animate attributeName="y" values="20;590;20" dur="4s" repeatCount="indefinite"/>
  </rect>

  <g clip-path="url(#asciiClip)">
    <rect x="40" y="40" width="500" height="530" rx="16" fill="rgba(15,23,42,0.8)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <circle cx="65" cy="62" r="5" fill="#EF4444"/>
    <circle cx="85" cy="62" r="5" fill="#F59E0B"/>
    <circle cx="105" cy="62" r="5" fill="#10B981"/>
    <text x="125" y="67" font-family="monospace" font-size="11" fill="#64748B">umar@ai-terminal ~ master</text>

    <g font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="url(#asciiGrad)" filter="url(#glow)">
      <text x="60" y="130" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
        █████╗ ██╗     ███████╗██╗  ██╗
      </text>
      <text x="60" y="155" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
        ██╔══██╗██║     ██╔════╝██║  ██║
      </text>
      <text x="60" y="180" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
        ███████║██║     █████╗  ███████║
      </text>
      <text x="60" y="205" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
        ██╔══██║██║     ██╔══╝  ██╔══██║
      </text>
      <text x="60" y="230" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.7s" fill="freeze"/>
        ██║  ██║███████╗███████╗██║  ██║
      </text>
      <text x="60" y="255" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.0s" fill="freeze"/>
        ╚═╝  ╚═╝╚══════╝╚══════╝╚═╝  ╚═╝
      </text>
    </g>

    <circle cx="100" cy="300" r="2" fill="#22D3EE" opacity="0.6">
      <animate attributeName="cy" values="300;280;300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="350" r="1.5" fill="#7C3AED" opacity="0.5">
      <animate attributeName="cy" values="350;330;350" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="400" r="2.5" fill="#10B981" opacity="0.4">
      <animate attributeName="cy" values="400;380;400" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="450" r="1" fill="#22D3EE" opacity="0.7">
      <animate attributeName="cy" values="450;430;450" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <rect x="60" y="270" width="10" height="18" fill="#22D3EE" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g>
    <rect x="570" y="40" width="570" height="530" rx="16" fill="rgba(15,23,42,0.5)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="600" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#F8FAFC">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.2s" fill="freeze"/>
